<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mexico Limited — Simulador de WhatsApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b141a;
            color: #e9edef;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ── Container ── */
        .chat-container {
            width: 100%;
            max-width: 520px;
            height: 95vh;
            display: flex;
            flex-direction: column;
            background: #0b141a;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        /* ── Header ── */
        .chat-header {
            background: #202c33;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #006847, #ce1126);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .header-info h2 {
            font-size: 16px;
            font-weight: 600;
            color: #e9edef;
        }

        .header-info p {
            font-size: 12px;
            color: #8696a0;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00a884;
            border-radius: 50%;
            display: inline-block;
            margin-right: 4px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .demo-badge {
            margin-left: auto;
            background: rgba(0,168,132,0.15);
            color: #00a884;
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 12px;
            letter-spacing: 0.5px;
        }

        /* ── Messages Area ── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background:
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E"),
                #0b141a;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: #374045;
            border-radius: 3px;
        }

        .message {
            max-width: 82%;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.45;
            position: relative;
            word-wrap: break-word;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: #005c4b;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
            color: #e9edef;
        }

        .message.bot {
            background: #202c33;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            color: #e9edef;
        }

        .message .time {
            font-size: 11px;
            color: rgba(233,237,239,0.5);
            margin-top: 4px;
            text-align: right;
        }

        .message.user .time {
            color: rgba(233,237,239,0.6);
        }

        /* ── Typing indicator ── */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: #202c33;
            padding: 12px 18px;
            border-radius: 8px;
            border-bottom-left-radius: 2px;
            animation: fadeIn 0.3s ease;
        }

        .typing-indicator.show { display: flex; }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8696a0;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite both;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* ── Welcome message ── */
        .system-message {
            align-self: center;
            background: rgba(32,44,51,0.8);
            color: #8696a0;
            font-size: 12px;
            padding: 6px 14px;
            border-radius: 8px;
            text-align: center;
            margin: 8px 0;
        }

        /* ── Input Area ── */
        .chat-input-area {
            background: #202c33;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #2a3942;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: #2a3942;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e9edef;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            outline: none;
            resize: none;
            max-height: 100px;
        }

        .chat-input::placeholder {
            color: #8696a0;
        }

        .send-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 50%;
            background: #00a884;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: #06cf9c;
            transform: scale(1.05);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn:disabled {
            background: #374045;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Setup Bar ── */
        .setup-bar {
            background: #1a2730;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #2a3942;
        }

        .setup-bar label {
            font-size: 12px;
            color: #8696a0;
            white-space: nowrap;
        }

        .setup-bar input {
            background: #2a3942;
            border: 1px solid #374045;
            border-radius: 6px;
            padding: 5px 10px;
            color: #e9edef;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            outline: none;
            flex: 1;
            min-width: 0;
        }

        .setup-bar input:focus {
            border-color: #00a884;
        }

        /* ── Template message styling ── */
        .template-badge {
            display: inline-block;
            background: rgba(0,168,132,0.15);
            color: #00a884;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="avatar">🇲🇽</div>
            <div class="header-info">
                <h2>Mexico Limited Bot</h2>
                <p><span class="status-dot"></span>Agente IA activo</p>
            </div>
            <span class="demo-badge">SIMULADOR</span>
        </div>

        <!-- Setup -->
        <div class="setup-bar">
            <label for="sim-phone">📱</label>
            <input type="text" id="sim-phone" value="+525500000001" placeholder="Tu número simulado">
            <label for="sim-name">👤</label>
            <input type="text" id="sim-name" value="Emprendedor Demo" placeholder="Tu nombre">
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chat-messages">
            <div class="system-message">
                Simulador de WhatsApp para demos.<br>
                Los mensajes se procesan a través del agente IA real<br>
                y se registran en Google Sheets.
            </div>
        </div>

        <!-- Typing indicator -->
        <div style="padding: 0 16px 4px;">
            <div class="typing-indicator" id="typing">
                <span></span><span></span><span></span>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <input
                type="text"
                class="chat-input"
                id="chat-input"
                placeholder="Escribe un mensaje..."
                autocomplete="off"
            />
            <button class="send-btn" id="send-btn" title="Enviar">
                ➤
            </button>
        </div>
    </div>

    <script>
        const messagesEl = document.getElementById('chat-messages');
        const inputEl = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const typingEl = document.getElementById('typing');
        const phoneEl = document.getElementById('sim-phone');
        const nameEl = document.getElementById('sim-name');

        function getTime() {
            return new Date().toLocaleTimeString('es-MX', {
                hour: '2-digit', minute: '2-digit'
            });
        }

        function addMessage(text, sender, extra = '') {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = `
                ${extra}
                ${text.replace(/\n/g, '<br>')}
                <div class="time">${getTime()}</div>
            `;
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
        }

        function setLoading(loading) {
            typingEl.classList.toggle('show', loading);
            sendBtn.disabled = loading;
            inputEl.disabled = loading;
            if (loading) {
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }

        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Show user message
            addMessage(text, 'user');
            inputEl.value = '';
            setLoading(true);

            try {
                const res = await fetch('/api/simulator/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phoneEl.value.trim(),
                        name: nameEl.value.trim(),
                        message: text,
                    }),
                });

                const data = await res.json();

                if (data.responses && data.responses.length > 0) {
                    for (const resp of data.responses) {
                        if (resp.type === 'template') {
                            const badge = '<span class="template-badge">📋 PLANTILLA: ' + resp.template + '</span><br>';
                            const templateText = resp.parameters
                                ? resp.parameters.join(' | ')
                                : '(sin parámetros)';
                            addMessage(templateText, 'bot', badge);
                        } else {
                            addMessage(resp.text || '(sin respuesta)', 'bot');
                        }
                    }
                } else {
                    addMessage('(El agente no generó respuesta)', 'bot');
                }
            } catch (err) {
                addMessage('⚠️ Error de conexión: ' + err.message, 'bot');
            } finally {
                setLoading(false);
                inputEl.focus();
            }
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        inputEl.focus();
    </script>
</body>
</html>
